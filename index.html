<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Subway Countdown Sign</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet"><link rel="stylesheet" href="style.css">
</head>
<body>
<div class="led-sign">
    <div class="station-title" id="station-name">LOADING STATION...</div>
    <div class="train-section">
        <div class="left-column">
            <span class="route-bullet route-f">F</span>
        </div>
        <div class="right-column">
            <div class="destination-header">Uptown</div>
            <div class="arrival-times" id="f-times">Loading...</div>
        </div>
    </div>

    <div class="dotted-divider"></div>

    <div class="train-section">
        <div class="left-column">
            <span class="route-bullet route-g">G</span>
        </div>
        <div class="right-column">
            <div class="destination-header">Uptown</div>
            <div class="arrival-times" id="g-times">Loading...</div>
        </div>
    </div>
</div>
    <script src="app.js"></script>
</body>
</html>
